<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#11131a" />
  <title>🎹 Live Piano</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="nav">
    <span class="brand">🎹 Piano</span>
    <a href="./" class="active">Live Piano</a>
    <a href="./chords">Chords</a>
    <a href="./organist">Organist</a>
  </nav>

  <header>
    <h1>Live Piano</h1>
    <p class="sub">Click / tap the keys, or use your computer keyboard
      (<kbd>A</kbd> <kbd>W</kbd> <kbd>S</kbd> <kbd>E</kbd> <kbd>D</kbd> … starting at middle C).</p>
  </header>

  <main>
    <div class="controls">
      <label>🎚️ Voice
        <select id="voice"></select>
      </label>
    </div>
    <div class="kb-wrap">
      <div id="keyboard"></div>
    </div>
  </main>

  <footer>
    <p>Sound synthesized in your browser with the Web Audio API.</p>
    <p class="credit">Created by
      <a href="https://giftlin27.github.io/GiftPortfolio/" target="_blank" rel="noopener">Gift</a>
      — <a href="https://giftlin27.github.io/GiftPortfolio/" target="_blank" rel="noopener">view portfolio ↗</a>
    </p>
  </footer>
  <script type="module" src="./piano-page.js"></script>
</body>
</html>
