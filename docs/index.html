<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#11131a" />
  <title>🎹 Piano Chords</title>
  <meta name="description" content="Tap a chord to hear it — works on any device, no install." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>🎹 Piano Chords</h1>
    <p class="sub">Tap any chord to play it. Works on phone, tablet, or desktop.</p>
  </header>

  <main>
    <div class="grid-wrap">
      <table id="grid" aria-label="Chord grid"></table>
    </div>
  </main>

  <footer>
    <p>Sound synthesized in your browser with the Web Audio API.</p>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
